<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropix</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; text-align: center; margin: 0; padding: 20px; }
        #products-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .product-card { background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; width: 250px; }
        .product-card img { width: 100%; border-radius: 5px; }
        .buy-btn { background: #ff00ff; color: #fff; border: none; padding: 10px; cursor: pointer; width: 100%; border-radius: 5px; margin-top: 10px; }
        
        /* מודל */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #111; margin: 10% auto; padding: 20px; width: 80%; max-width: 400px; border: 1px solid #ff00ff; border-radius: 10px; position: relative; }
        .close { position: absolute; left: 10px; top: 5px; cursor: pointer; font-size: 20px; }
        
        .review-item { border-bottom: 1px solid #333; padding: 10px; text-align: right; position: relative; }
        .delete-btn { color: red; cursor: pointer; font-size: 10px; position: absolute; left: 0; top: 5px; }
        input, textarea { width: 100%; margin-bottom: 10px; background: #222; color: #fff; border: 1px solid #333; padding: 5px; }
    </style>
</head>
<body>

    <h1>Dropix</h1>
    <div id="products-container"></div>

    <div id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
