<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>החנות המקצועית שלי</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">MY-STORE</div>
            <div class="search-bar">
                <input type="text" placeholder="חפש מוצרים, מותגים ועוד...">
                <button>חיפוש</button>
            </div>
            <div class="nav-links">
                <span id="cart-count">🛒 סל קניות (0)</span>
            </div>
        </nav>
    </header>

    <section class="hero">
        <h1>הקולקציה החדשה כבר כאן 🔥</h1>
        <p>משלוחים חינם לכל הארץ לזמן מוגבל</p>
    </section>

    <main>
        <h2 class="section-title">המוצרים החמים שלנו</h2>
        <div class="products-grid" id="products-container">
            </div>
    </main>

    <footer>
        <p>© 2026 כל הזכויות שמורות לחנות שלי</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
