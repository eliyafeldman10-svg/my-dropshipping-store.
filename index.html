<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropix | חנות הטירוף שלי</title>
   <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: #fff; margin: 0; padding: 20px; direction: rtl; }
    #products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
    .product-card { background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center; transition: 0.3s; }
    .product-card:hover { border-color: #ff00ff; }
    .product-card img { max-width: 100%; border-radius: 10px; }
    .price { font-size: 22px; color: #ff00ff; font-weight: bold; margin: 10px 0; }
    .buy-btn { background: #ff00ff; color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 100%; }
    
    /* מודל נקי וכהה */
    #modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; }
    .modal-content { background: #111; border: 1px solid #333; margin: 5% auto; padding: 25px; width: 90%; max-width: 450px; border-radius: 20px; color: #fff; }
    .summary-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin: 20px 0; border: 1px solid #222; }
    .summary-line { display: flex; justify-content: space-between; margin-bottom: 10px; color: #aaa; font-size: 14px; }
    .total-line { display: flex; justify-content: space-between; border-top: 1px solid #333; padding-top: 12px; margin-top: 10px; font-weight: bold; font-size: 20px; color: #fff; }
    .order-btn { background: #ff00ff; color: white; width: 100%; padding: 18px; border: none; border-radius: 35px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .order-btn:hover { background: #e600e6; transform: scale(1.02); }
    
    .review-item { background: #1a1a1a; border: 1px solid #222; padding: 12px; border-radius: 10px; margin-bottom: 10px; position: relative; }
    .delete-btn { color: #ff4d4d; cursor: pointer; font-size: 11px; position: absolute; left: 10px; top: 10px; }
    input, textarea, select { background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
</style>
</head>
<body>

    <h1 style="text-align: center;">Dropix 🚀</h1>
    <div id="products-container"></div>

    <div id="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="position: absolute; left: 15px; top: 10px; cursor: pointer; font-size: 24px;">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
