<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropix | חנות הגאדג'טים שלך</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <header>
        <div class="logo">Dropix</div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="חפש מוצר..." onkeyup="filterProducts()">
        </div>
        <nav>
            <a href="#" onclick="showSection('support')">שירות לקוחות</a>
            <a href="#" onclick="showSection('about')">אודות</a>
        </nav>
    </header>

    <main id="products-container">
        </main>

    <footer>
        <p>&copy; 2026 Dropix - כל הזכויות שמורות</p>
        <p>ליצירת קשר: dropix.help@gmail.com</p>
        <div class="footer-links">
            <span onclick="showSection('shipping')">מדיניות משלוחים</span> | 
            <span onclick="showSection('support')">תמיכה</span>
        </div>
    </footer>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
